<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a24;--card:#16161f;--text:#fff;--text2:#a0a0b0;--muted:#6b6b7b;--accent:#6366f1;--accent2:#8b5cf6;--salon:#ec4899;--salon2:#f97316;--grad:linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899);--salon-grad:linear-gradient(135deg,#ec4899,#f97316);--ok:#10b981;--warn:#f59e0b;--err:#ef4444;--border:rgba(255,255,255,0.08);--r:12px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}#root{min-height:100vh;display:flex;flex-direction:column}

/* ── NAV ────────────────────────────────────── */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:1rem 2rem;background:rgba(10,10,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}.nav-c{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}.logo{display:flex;align-items:center;gap:.75rem;cursor:pointer}.logo-i{font-size:1.75rem;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.logo-t{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:2px}.nav-l{display:flex;gap:2rem}.nav-l span{color:var(--text2);cursor:pointer;font-weight:500;transition:.3s;position:relative;padding-bottom:4px}.nav-l span::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--grad);border-radius:2px;transform:scaleX(0);transition:.3s}.nav-l span:hover,.nav-l span.active{color:var(--text)}.nav-l span.active::after,.nav-l span:hover::after{transform:scaleX(1)}
.main{flex:1;padding-top:80px}

/* ── HOME / EVENTS ─────────────────────────── */
.hero{padding:6rem 2rem 4rem;background:linear-gradient(180deg,var(--bg2),var(--bg))}.hero-c{max-width:1400px;margin:0 auto}.hero h1{font-family:'Space Grotesk';font-size:clamp(2.5rem,6vw,4.5rem);font-weight:700;line-height:1.1;margin-bottom:1rem}.hero h1 span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.hero p{font-size:1.25rem;color:var(--text2);max-width:600px}
.filters{max-width:1400px;margin:0 auto;padding:0 2rem;margin-top:-2rem;position:relative;z-index:2}.search{position:relative;margin-bottom:1.5rem}.search input{width:100%;padding:1rem 1rem 1rem 3rem;background:var(--card);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:1rem}.search input:focus{outline:none;border-color:var(--accent)}.search input::placeholder{color:var(--muted)}.search svg{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--muted)}.cats{display:flex;gap:.75rem;flex-wrap:wrap}.cat{padding:.625rem 1.25rem;background:var(--card);border:1px solid var(--border);border-radius:100px;color:var(--text2);font-size:.9rem;cursor:pointer;transition:.3s}.cat:hover{border-color:var(--muted);color:var(--text)}.cat.active{background:var(--accent);border-color:transparent;color:#fff}
.events{max-width:1400px;margin:0 auto;padding:3rem 2rem}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:1.5rem}.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:.3s;display:flex;flex-direction:column}.card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 8px 40px rgba(0,0,0,.5)}.card-h{padding:1.5rem;background:linear-gradient(135deg,rgba(99,102,241,.15),transparent);display:flex;justify-content:space-between}.card-cat{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--accent)}.card-date{display:flex;flex-direction:column;align-items:center;background:var(--bg);padding:.5rem .75rem;border-radius:8px}.card-day{font-family:'Space Grotesk';font-size:1.5rem;font-weight:700;line-height:1}.card-mon{font-size:.75rem;text-transform:uppercase;color:var(--text2)}.card-b{padding:1.5rem;flex:1;display:flex;flex-direction:column}.card-title{font-family:'Space Grotesk';font-size:1.35rem;font-weight:600;margin-bottom:.5rem}.card-venue{display:flex;align-items:center;gap:.5rem;color:var(--text2);font-size:.9rem;margin-bottom:.75rem}.card-desc{color:var(--muted);font-size:.9rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:1rem;flex:1}.card-f{display:flex;justify-content:space-between;align-items:flex-end}.price-l{font-size:.75rem;color:var(--muted)}.price-v{font-family:'Space Grotesk';font-size:1.5rem;font-weight:700;color:var(--accent)}.seats{padding:.375rem .75rem;background:rgba(16,185,129,.15);color:var(--ok);border-radius:100px;font-size:.8rem}.seats.low{background:rgba(239,68,68,.15);color:var(--err)}.card-cta{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:1rem;background:var(--bg3);border-top:1px solid var(--border);font-weight:600;color:var(--text2);transition:.3s}.card:hover .card-cta{background:var(--accent);color:#fff}

/* ── SALON LISTING ──────────────────────────── */
.salon-hero{padding:6rem 2rem 4rem;background:linear-gradient(180deg,rgba(236,72,153,.08),var(--bg))}.salon-hero h1 span{background:var(--salon-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.salon-cards{max-width:1400px;margin:0 auto;padding:3rem 2rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:1.5rem}
.salon-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:.3s}.salon-card:hover{transform:translateY(-4px);border-color:var(--salon);box-shadow:0 8px 40px rgba(236,72,153,.2)}.salon-card-top{padding:2rem;background:linear-gradient(135deg,rgba(236,72,153,.12),rgba(249,115,22,.06))}.salon-icon{font-size:3rem;margin-bottom:.75rem}.salon-card-name{font-family:'Space Grotesk';font-size:1.5rem;font-weight:700;margin-bottom:.25rem}.salon-card-tag{color:var(--text2);font-size:.95rem;margin-bottom:1rem}.salon-card-meta{display:flex;gap:1rem}.salon-chip{padding:.375rem .875rem;background:rgba(236,72,153,.12);border:1px solid rgba(236,72,153,.2);border-radius:100px;font-size:.8rem;color:var(--salon)}.salon-card-body{padding:1.5rem}.salon-card-body p{color:var(--text2);font-size:.9rem;margin-bottom:1.5rem;line-height:1.6}.salon-outlets-preview{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.5rem}.outlet-pill{display:flex;align-items:center;gap:.5rem;color:var(--text2);font-size:.85rem}.salon-card-cta{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:1rem;background:var(--bg3);border-top:1px solid var(--border);font-weight:600;color:var(--text2);transition:.3s}.salon-card:hover .salon-card-cta{background:var(--salon-grad);color:#fff}

/* ── SALON DETAIL ───────────────────────────── */
.salon-detail{min-height:100vh;padding-bottom:4rem}
.salon-detail-h{background:linear-gradient(180deg,rgba(236,72,153,.1),var(--bg));padding:4rem 2rem 3rem}
.salon-detail-hc{max-width:1400px;margin:0 auto}
.salon-badge{display:inline-block;padding:.375rem 1rem;background:var(--salon-grad);border-radius:100px;font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:1rem}
.salon-detail-name{font-family:'Space Grotesk';font-size:clamp(2rem,5vw,3.5rem);font-weight:700;margin-bottom:.5rem}
.salon-detail-tag{font-size:1.15rem;color:var(--text2);margin-bottom:1.5rem}
.salon-detail-c{max-width:1400px;margin:0 auto;padding:2rem}

/* Outlets grid */
.outlets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem;margin-bottom:3rem}
.outlet-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:1.5rem;cursor:pointer;transition:.3s;position:relative}
.outlet-card:hover,.outlet-card.selected{border-color:var(--salon);background:rgba(236,72,153,.05)}
.outlet-card.selected::after{content:'✓ Selected';position:absolute;top:.75rem;right:.75rem;padding:.25rem .625rem;background:var(--salon);color:#fff;border-radius:100px;font-size:.75rem;font-weight:600}
.outlet-name{font-family:'Space Grotesk';font-size:1.15rem;font-weight:600;margin-bottom:.5rem}
.outlet-info{display:flex;flex-direction:column;gap:.35rem;color:var(--text2);font-size:.875rem}.outlet-info span{display:flex;align-items:center;gap:.4rem}
.outlet-badge{display:inline-block;margin-top:.75rem;padding:.3rem .75rem;background:rgba(16,185,129,.12);color:var(--ok);border-radius:100px;font-size:.75rem}

/* Services */
.services-section{margin-bottom:3rem}
.sec-title{font-family:'Space Grotesk';font-size:1.5rem;font-weight:600;margin-bottom:1.25rem}
.service-cats{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.5rem}
.services-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.service-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:1.25rem;cursor:pointer;transition:.3s}
.service-card:hover,.service-card.selected{border-color:var(--salon);background:rgba(236,72,153,.05)}
.service-card.selected{box-shadow:0 0 0 2px var(--salon)}
.service-name{font-weight:600;margin-bottom:.3rem}
.service-desc{color:var(--text2);font-size:.85rem;margin-bottom:.75rem}
.service-meta{display:flex;justify-content:space-between;align-items:center}
.service-dur{font-size:.8rem;color:var(--muted)}.service-price{font-family:'Space Grotesk';font-size:1.2rem;font-weight:700;color:var(--salon)}

/* Booking flow */
.booking-flow{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:2rem}
.flow-steps{display:flex;border-bottom:1px solid var(--border)}
.flow-step{flex:1;padding:1rem;text-align:center;font-size:.85rem;font-weight:600;color:var(--muted);position:relative;border-bottom:2px solid transparent;transition:.3s}
.flow-step.active{color:var(--salon);border-bottom-color:var(--salon)}
.flow-step.done{color:var(--ok)}
.flow-content{padding:2rem}
.flow-title{font-family:'Space Grotesk';font-size:1.25rem;font-weight:600;margin-bottom:1.5rem}

/* Date picker */
.date-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.5rem;margin-bottom:1.5rem}
.date-btn{padding:.75rem .5rem;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;transition:.3s;text-align:center;font-size:.85rem}
.date-btn:hover:not(.past){border-color:var(--salon);color:var(--text)}
.date-btn.selected{background:var(--salon);border-color:var(--salon);color:#fff}
.date-btn.past{opacity:.3;cursor:not-allowed}
.date-day-name{font-size:.7rem;text-transform:uppercase;color:var(--muted);margin-bottom:.2rem}
.date-day-num{font-family:'Space Grotesk';font-size:1.25rem;font-weight:700}

/* Time slots */
.slots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.75rem}
.slot-btn{padding:.875rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;transition:.3s;text-align:center}
.slot-btn:hover:not(.full){border-color:var(--salon);color:var(--text)}
.slot-btn.selected{background:var(--salon);border-color:var(--salon);color:#fff}
.slot-btn.full{opacity:.35;cursor:not-allowed}
.slot-time{font-family:'Space Grotesk';font-size:1rem;font-weight:600}
.slot-avail{font-size:.75rem;margin-top:.2rem}

/* Seat picker for salon */
.salon-seat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.75rem;max-width:500px;margin:0 auto}
.salon-seat{aspect-ratio:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:.3s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.2rem;font-size:.75rem;color:var(--text2)}
.salon-seat:hover:not(.booked):not(.locked){border-color:var(--salon);color:var(--text);transform:scale(1.05)}
.salon-seat.selected{background:var(--salon);border-color:var(--salon);color:#fff;transform:scale(1.08)}
.salon-seat.booked,.salon-seat.locked{background:rgba(255,255,255,.03);cursor:not-allowed;opacity:.4}
.salon-seat-icon{font-size:1.5rem}
.salon-seat-label{font-size:.65rem}
.salon-seat-legend{display:flex;gap:1.5rem;justify-content:center;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border)}
.salon-legend-item{display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--text2)}
.legend-dot{width:14px;height:14px;border-radius:4px}

/* Summary sidebar for salon */
.salon-summary{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:1.5rem;position:sticky;top:100px}
.salon-summary h3{font-family:'Space Grotesk';font-size:1.2rem;margin-bottom:1.25rem}
.sum-row{display:flex;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--border);font-size:.9rem}
.sum-row:last-of-type{border-bottom:none}
.sum-label{color:var(--text2)}.sum-val{font-weight:600}
.sum-total{display:flex;justify-content:space-between;padding:1rem;background:var(--bg3);border-radius:var(--r);margin:1rem 0}
.sum-total-label{font-weight:600}.sum-total-val{font-family:'Space Grotesk';font-size:1.5rem;font-weight:700;color:var(--salon)}
.detail-layout{display:grid;grid-template-columns:1fr 360px;gap:2rem}

/* ── BOOKING DETAIL (Events) ─────────────────── */
.detail{min-height:100vh;padding-bottom:4rem}.detail-h{background:linear-gradient(180deg,var(--bg2),var(--bg));padding:4rem 2rem}.detail-hc{max-width:1400px;margin:0 auto}.detail-badge{display:inline-block;padding:.375rem 1rem;background:var(--grad);border-radius:100px;font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:1rem}.detail-name{font-family:'Space Grotesk';font-size:clamp(2rem,5vw,3.5rem);font-weight:700;margin-bottom:1.5rem}.detail-meta{display:flex;flex-wrap:wrap;gap:2rem;margin-bottom:1.5rem}.meta-i{display:flex;align-items:center;gap:.5rem;color:var(--text2)}.detail-c{max-width:1400px;margin:0 auto;padding:2rem;display:grid;grid-template-columns:1fr 380px;gap:2rem}
.seat-sec{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:2rem}.sec-title{font-family:'Space Grotesk';font-size:1.5rem;margin-bottom:1.5rem}.stage{width:60%;max-width:400px;margin:0 auto 2rem;padding:1rem 2rem;background:linear-gradient(180deg,var(--accent),#8b5cf6);border-radius:0 0 100px 100px;text-align:center;font-weight:700;letter-spacing:3px;font-size:.9rem}.seat-map{display:flex;flex-direction:column;gap:.5rem;align-items:center;padding:1rem;overflow-x:auto}.seat-row{display:flex;align-items:center;gap:.5rem}.row-l{width:24px;font-weight:600;color:var(--muted);text-align:center;font-size:.85rem}.seat-seats{display:flex;gap:.35rem}.seat{width:28px;height:28px;border-radius:6px 6px 8px 8px;border:none;cursor:pointer;font-size:.65rem;display:flex;align-items:center;justify-content:center;transition:.3s}.seat.vip{background:linear-gradient(135deg,#ffd700,#ffb700)}.seat.premium{background:linear-gradient(135deg,#c0c0c0,#a0a0a0)}.seat.standard{background:linear-gradient(135deg,#cd853f,#b87333)}.seat.booked,.seat.locked{background:var(--bg3)!important;cursor:not-allowed;opacity:.5}.seat.selected{background:var(--accent)!important;transform:scale(1.15);box-shadow:0 0 15px rgba(99,102,241,.5)}.seat:not(.booked):not(.locked):hover{transform:scale(1.1)}.legend{display:flex;flex-wrap:wrap;justify-content:center;gap:1.5rem;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border)}.legend-i{display:flex;align-items:center;gap:.5rem;font-size:.85rem;color:var(--text2)}.legend-s{width:20px;height:20px;border-radius:4px}.legend-s.av{background:var(--bg3);border:1px solid var(--border)}.legend-s.sel{background:var(--accent)}.legend-s.bk{background:var(--bg3);opacity:.4}.legend-s.vip{background:linear-gradient(135deg,#ffd700,#ffb700)}.legend-s.prem{background:linear-gradient(135deg,#c0c0c0,#a0a0a0)}.legend-s.std{background:linear-gradient(135deg,#cd853f,#b87333)}
.sidebar{position:sticky;top:100px;height:fit-content}.summary{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:1.5rem}.summary h3{font-family:'Space Grotesk';font-size:1.25rem;margin-bottom:1.5rem}.tiers{display:flex;flex-direction:column;gap:.75rem;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}.tier{display:flex;align-items:center;gap:.75rem}.tier-c{width:16px;height:16px;border-radius:4px}.tier-c.vip{background:linear-gradient(135deg,#ffd700,#ffb700)}.tier-c.prem{background:linear-gradient(135deg,#c0c0c0,#a0a0a0)}.tier-c.std{background:linear-gradient(135deg,#cd853f,#b87333)}.tier-n{flex:1;font-weight:500}.tier-p{font-weight:600}.sel-list{margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}.sel-list h4{font-size:.9rem;color:var(--text2);margin-bottom:.75rem}.sel-item{display:flex;align-items:center;gap:.75rem;padding:.5rem 0;font-size:.9rem}.sel-badge{padding:.2rem .5rem;border-radius:4px;font-size:.7rem;font-weight:600;color:#1a1a24}.total{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding:1rem;background:var(--bg3);border-radius:var(--r)}.total-v{font-family:'Space Grotesk';font-size:1.75rem;font-weight:700;color:var(--accent)}.form{margin-bottom:1.5rem}.form h4{font-size:.9rem;color:var(--text2);margin-bottom:.75rem}.form input{width:100%;padding:.75rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.95rem;margin-bottom:.75rem}.form input:focus{outline:none;border-color:var(--accent)}.form input::placeholder{color:var(--muted)}.btn{width:100%;display:flex;align-items:center;justify-content:center;gap:.75rem;padding:1rem;background:var(--grad);border:none;border-radius:var(--r);color:#fff;font-weight:600;font-size:1rem;cursor:pointer;transition:.3s}.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 25px rgba(99,102,241,.4)}.btn:disabled{opacity:.5;cursor:not-allowed}.btn.salon-btn{background:var(--salon-grad)}.btn.salon-btn:hover:not(:disabled){box-shadow:0 8px 25px rgba(236,72,153,.4)}.err-banner{display:flex;align-items:center;gap:.75rem;padding:1rem;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:var(--r);margin-bottom:1.5rem;color:var(--err);font-size:.9rem}.err-banner button{margin-left:auto;background:none;border:none;color:inherit;font-size:1.25rem;cursor:pointer}.lock-t{display:flex;align-items:center;gap:.5rem;padding:.75rem 1rem;background:rgba(245,158,11,.15);border-radius:var(--r);margin-bottom:1.5rem;color:var(--warn);font-size:.9rem}

/* ── CHECKOUT ─────────────────────────────────── */
.checkout{min-height:100vh;padding:2rem}.checkout-c{max-width:1200px;margin:0 auto}.checkout-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}.checkout-h h1{font-family:'Space Grotesk';font-size:2rem}.secure{display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;background:rgba(16,185,129,.15);border-radius:100px;color:var(--ok);font-size:.85rem}.checkout-grid{display:grid;grid-template-columns:1fr 400px;gap:2rem}.pay-sec,.order-sum{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:2rem}.pay-sec h2,.order-sum h2{font-size:1.25rem;margin-bottom:1.5rem}.methods{display:flex;flex-direction:column;gap:1rem;margin-bottom:1.5rem}.method{display:flex;align-items:center;padding:1rem 1.25rem;background:var(--bg3);border:2px solid var(--border);border-radius:var(--r);cursor:pointer;transition:.3s}.method:hover{border-color:var(--muted)}.method.sel{border-color:var(--accent);background:rgba(99,102,241,.1)}.method.salon-sel{border-color:var(--salon);background:rgba(236,72,153,.1)}.method input{display:none}.method-c{display:flex;align-items:center;gap:1rem;font-weight:500}.method-i{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:8px}.card-form{padding:1.5rem;background:var(--bg3);border-radius:var(--r);margin-bottom:1.5rem}.fg{margin-bottom:1rem}.fg:last-child{margin-bottom:0}.fg label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:.5rem}.fg input{width:100%;padding:.875rem 1rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1rem}.fg input:focus{outline:none;border-color:var(--accent)}.fr{display:grid;grid-template-columns:1fr 1fr;gap:1rem}.pay-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:.75rem;padding:1.125rem;background:var(--grad);border:none;border-radius:var(--r);color:#fff;font-weight:600;font-size:1.1rem;cursor:pointer;transition:.3s;mar .confirm{min-height:100vh;padding:2rem;max-width:900px;margin:0 auto}.success-h{text-align:center;margin-bottom:3rem}.success-i{width:100px;height:100px;margin:0 auto 1.5rem;background:linear-gradient(135deg,rgba(16,185,129,.2),rgba(16,185,129,.05));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:3rem}.success-h h1{font-family:'Space Grotesk';font-size:2.5rem;margin-bottom:.75rem}.success-h p{color:var(--text2);font-size:1.1rem}.success-h code{background:var(--bg3);padding:.375rem .75rem;border-radius:8px;font-family:'Space Grotesk',monospace;color:var(--accent)}.ticket{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:2rem}.ticket-h{display:flex;justify-content:space-between;align-items:center;padding:1.5rem;background:var(--grad)}.ticket-h.salon-ticket-h{background:var(--salon-grad)}.ticket-logo{font-family:'Space Grotesk';font-size:1.25rem;font-weight:700;letter-spacing:2px}.ticket-type{font-size:.8rem;font-weight:600;letter-spacing:2px;padding:.375rem .75rem;background:rgba(255,255,255,.2);border-radius:4px}.ticket-b{display:grid;grid-template-columns:1fr auto;gap:2rem;padding:2rem;border-bottom:2px dashed var(--border)}.ticket-m{display:flex;flex-direction:column;gap:1.25rem}.ticket-m .t-name{font-family:'Space Grotesk';font-size:1.75rem;font-weight:700}.ticket-d{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}.d-block{display:flex;flex-direction:column;gap:.25rem}.d-label{font-size:.7rem;font-weight:600;letter-spacing:1px;color:var(--muted);text-transform:uppercase}.d-value{font-weight:500}.s-chips{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.5rem}.s-chip{padding:.375rem .75rem;background:var(--bg3);border-radius:100px;font-size:.85rem}.s-chip.vip{background:rgba(255,215,0,.2);color:#ffd700}.s-chip.premium{background:rgba(192,192,192,.2);color:#c0c0c0}.s-chip.standard{background:rgba(205,133,63,.2);color:#cd853f}.s-chip.salon{background:rgba(236,72,153,.1 .admin{min-height:100vh;padding:2rem;max-width:1400px;margin:0 auto}.admin-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2rem}.admin-h h1{font-family:'Space Grotesk';font-size:2rem;margin-bottom:.25rem}.admin-h p{color:var(--text2)}.refresh{display:flex;align-items:center;gap:.5rem;padding:.75rem 1.25rem;background:var(--card);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-weight:500;cursor:pointer;transition:.3s}.refresh:hover{border-color:var(--accent);background:rgba(99,102,241,.1)}.tabs{display:flex;gap:.5rem;margin-bottom:2rem;padding:.375rem;background:var(--card);border-radius:var(--r);width:fit-content}.tabs button{padding:.75rem 1.5rem;background:transparent;border:none;border-radius:8px;color:var(--text2);font-weight:500;cursor:pointer;transition:.3s}.tabs button:hover{color:var(--text)}.tabs button.active{background:var(--accent);color:#fff}.stats-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.5rem;margin-bottom:2rem}.stat-c{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:1.5rem;display:flex;align-items:flex-start;gap:1rem;position:relative;overflow:hidden}.stat-c::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}.stat-i{font-size:2rem}.stat-co{display:flex;flex-direction:column}.stat-t{font-size:.9rem;color:var(--text2);margin-bottom:.25rem}.stat-v{font-family:'Space Grotesk';font-size:1.75rem;font-weight:700}.charts{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}.chart-c{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:1.5rem}.chart-c h3{font-size:1.1rem;margin-bottom:1.5rem}.cat-bars{display:flex;flex-direction:column;gap:1rem}.cat-row{display:grid;grid-template-columns:100px 1fr 80px;align-items:center;gap:1rem}.cat-name{font-size:.9rem;font-weight:500}.bar-c{height:24px;background:var(--bg3);border-radius:4px;overflow:hidden}.bar-f{height:100%;border-radius:4px;transition:width .5s}.cat-val{font-weight:600;text-align:right;font-size:.9rem}.act-list{display:flex;flex-direction:column;gap:1rem}.act-item{display:flex;align-items:center;gap:1rem;padding:.75rem;background:var(--bg3);border-radius:8px}.act-ic{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem}.act-co{flex:1;display:flex;flex-direction:column}.act-ti{font-weight:500;font-size:.9rem}.act-me{font-size:.8rem;color:var(--muted)}.act-time{font-size:.8rem;color:var(--muted)}.no-data{color:var(--muted);text-align:center;padding:2rem}.table-c{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:1rem 1.25rem;text-align:left}.table th{background:var(--bg3);font-weight:600;font-size:.85rem;color:var(--text2);text-transform:uppercase}.table td{border-bottom:1px solid var(--border)}.table tr:last-child td{border-bottom:none}.cat-badge{display:inline-block;padding:.25rem .75rem;border-radius:100px;font-size:.8rem;font-weight:500;color:#1a1a24}.rev-cell{font-family:'Space Grotesk',monospace;font-weight:600}.occ-bar{display:flex;align-items:center;gap:.75rem}.occ-bar>div{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}.occ-fill{height:100%;border-radius:4px}.occ-bar span{font-size:.85rem;font-weight:500;min-width:40px}.id-cell code{font-family:'Space Grotesk',monospace;padding:.25rem .5rem;background:var(--bg3);border-radius:4px;font-size:.85rem}.cust-cell{display:flex;flex-direction:column}.cust-name{font-weight:500}.cust-email{font-size:.8rem;color:var(--muted)}.amt-cell{font-family:'Space Grotesk',monospace;font-weight:600;color:var(--ok)}.status-b{display:inline-block;padding:.25rem .75rem;border-radius:100px;font-size:.8rem;font-weight:500;text-transform:capitalize}.status-b.confirmed{background:rgba(16,185,129,.15);color:var(--ok)}.status-b.pending{background:rgba(245,158,11,.15);color:var(--warn)}

/* ── SHARED ────────────────────────────────────── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:1rem}.spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.spinner.salon-spin{border-top-color:var(--salon)}.empty{text-align:center;padding:4rem 2rem}.empty-i{font-size:4rem;margin-bottom:1rem}
.footer{background:var(--bg2);border-top:1px solid var(--border);padding:2rem;margin-top:auto}.footer-c{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}.footer-c p{color:var(--muted);font-size:.9rem}.footer-l{display:flex;gap:1.5rem}.footer-l span{color:var(--text2);font-size:.9rem;cursor:pointer}.footer-l span:hover{color:var(--text)}

<body>
  <div id="root"></div>
  <script type="text/babel">
const API='';const{useState,useEffect,useRef,useCallback}=React;
const getSessionId=()=>{let id=localStorage.getItem('session_id');if(!id){id='sess_'+Math.random().toString(36).substr(2,15);localStorage.setItem('session_id',id)}return id};
const fmt=(n)=>new Intl.NumberFormat('en-PK').format(n);

// ──────────────────────────────────────────────
// NAV
// ──────────────────────────────────────────────
function Nav({page,setPage}){
  return(
    <nav className="nav">
      <div className="nav-c">
        <div className="logo" onClick={()=>setPage({name:'list'})}>
          <span className="logo-i">◈</span>
          <span className="logo-t">EVENTIX</span>
        </div>
        <div className="nav-l">
          <span className={page.name==='list'?'active':''} onClick={()=>setPage({name:'list'})}>Events</span>
          <span className={page.name==='salons'||page.name==='salon'||page.name==='salon-checkout'||page.name==='salon-confirm'?'active':''} onClick={()=>setPage({name:'salons'})}>Salon Booking</span>
          <span className={page.name==='admin'?'active':''} onClick={()=>setPage({name:'admin'})}>Admin</span>
        </div>
      </div>
    </nav>
  )
}

// ──────────────────────────────────────────────
// EVENTS (unchanged)
// ──────────────────────────────────────────────
function EventCard({event,onClick}){const d=new Date(event.date);return(<div className="card" onClick={onClick}><div className="card-h"><span className="card-cat">{event.category}</span><div className="card-date"><span className="card-day">{d.getDate()}</span><span className="card-mon">{d.toLocaleDateString('en-US',{month:'short'})}</span></div></div><div className="card-b"><h3 className="card-title">{event.name}</h3><p className="card-venue">📍 {event.venue_name}, {event.city}</p><p className="card-desc">{event.description}</p><div className="card-f"><div><div className="price-l">From</div><div className="price-v">${event.base_price}</div></div><span className={`seats ${event.available_seats<50?'low':''}`}>{event.available_seats} seats</span></div></div><div className="card-cta">Get Tickets →</div></div>)}

function EventList({setPage}){const[events,setEvents]=useState([]);const[cats,setCats]=useState([]);const[loading,setLoading]=useState(true);const[filter,setFilter]=useState('');const[search,setSearch]=useState('');useEffect(()=>{fetch(`${API}/api/categories`).then(r=>r.json()).then(setCats).catch(()=>{});fetchEvents()},[]);useEffect(()=>{fetchEvents()},[filter,search]);const fetchEvents=async()=>{setLoading(true);const params=new URLSearchParams();if(filter)params.append('category',filter);if(search)params.append('search',search);params.append('upcoming','true');const data=await fetch(`${API}/api/events?${params}`).then(r=>r.json());setEvents(data);setLoading(false)};return(<div><header className="hero"><div className="hero-c"><h1><span>Discover</span><br/>Unforgettable Events</h1><p>From concerts to comedy, theater to sports — find your next experience</p></div></header><section className="filters"><div className="search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input type="text" placeholder="Search events..." value={search} onChange={e=>setSearch(e.target.value)}/></div><div className="cats"><button className={`cat ${filter===''?'active':''}`} onClick={()=>setFilter('')}>All</button>{cats.map(c=><button key={c} className={`cat ${filter===c?'active':''}`} onClick={()=>setFilter(c)}>{c}</button>)}</div></section><section className="events">{loading?(<div className="loading"><div className="spinner"></div><p>Loading...</p></div>):events.length===0?(<div className="empty"><div className="empty-i">🎫</div><h3>No events found</h3></div>):(<div className="grid">{events.map(e=><EventCard key={e.id} event={e} onClick={()=>setPage({name:'detail',id:e.id})}/>)}</div>)}</section></div>)}

function EventDetail({id,setPage}){const[event,setEvent]=useState(null);const[seats,setSeats]=useState({});const[selected,setSelected]=useState([]);const[loading,setLoading]=useState(true);const[error,setError]=useState(null);const[lockExp,setLockExp]=useState(null);const[user,setUser]=useState({name:'',email:'',phone:''});const[locking,setLocking]=useState(false);const sessionId=useRef(getSessionId());useEffect(()=>{fetch(`${API}/api/events/${id}`).then(r=>r.json()).then(setEvent);fetchSeats();const interval=setInterval(fetchSeats,5000);return()=>{clearInterval(interval);releaseSeats()}},[id]);const fetchSeats=async()=>{const data=await fetch(`${API}/api/events/${id}/seats`).then(r=>r.json());setSeats(data.seatsByRow||{});setLoading(false)};const releaseSeats=async()=>{await fetch(`${API}/api/events/${id}/seats/release`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:sessionId.current})}).catch(()=>{})};const lockSeats=async(seatIds)=>{setLocking(true);setError(null);try{const res=await fetch(`${API}/api/events/${id}/seats/lock`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({seatIds,sessionId:sessionId.current})});const data=await res.json();if(!res.ok){setError(data.error);if(data.unavailable)setSelected(s=>s.filter(x=>!data.unavailable.find(u=>u.id===x.id)));return false}setLockExp(new Date(data.expiresAt));return true}catch{setError('Failed to lock seats');return false}finally{setLocking(false)}};const toggleSeat=async(seat)=>{const isSel=selected.some(s=>s.id===seat.id);if(isSel){const newSel=selected.filter(s=>s.id!==seat.id);setSelected(newSel);if(newSel.length>0)await lockSeats(newSel.map(s=>s.id));else{await releaseSeats();setLockExp(null)}}else{if(selected.length>=10){setError('Max 10 seats');return}const newSel=[...selected,seat];setSelected(newSel);await lockSeats(newSel.map(s=>s.id))}};const getPrice=(tier)=>{if(!event)return 0;if(tier==='vip')return event.vip_price||event.base_price*2;if(tier==='premium')return event.premium_price||event.base_price*1.5;return event.base_price};const total=selected.reduce((sum,s)=>sum+getPrice(s.tier),0);const checkout=async()=>{if(!user.name||!user.email){setError('Please fill name and email');return}if(selected.length===0){setError('Select at least one seat');return}try{const res=await fetch(`${API}/api/bookings`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({eventId:id,seatIds:selected.map(s=>s.id),sessionId:sessionId.current,userName:user.name,userEmail:user.email,userPhone:user.phone})});const data=await res.json();if(!res.ok){setError(data.error);return}setPage({name:'checkout',bookingId:data.bookingId})}catch{setError('Failed')}};const getRemainingTime=()=>{if(!lockExp)return null;const rem=Math.max(0,Math.floor((lockExp-new Date())/1000));return`${Math.floor(rem/60)}:${(rem%60).toString().padStart(2,'0')}`};if(loading||!event)return<div className="loading"><div className="spinner"></div></div>;const d=new Date(event.date);return(<div className="detail"><header className="detail-h"><div className="detail-hc"><button className="back-btn" onClick={()=>setPage({name:'list'})}>← Back to Events</button><span className="detail-badge">{event.category}</span><h1 className="detail-name">{event.name}</h1><div className="detail-meta"><div className="meta-i">📅 {d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div><div className="meta-i">🕐 {d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</div><div className="meta-i">📍 {event.venue_name}, {event.city}</div></div><p style={{color:'var(--text2)',maxWidth:'800px'}}>{event.description}</p></div></header><div className="detail-c"><div className="seat-sec"><h2 className="sec-title">Select Your Seats</h2>{error&&<div className="err-banner">{error}<button onClick={()=>setError(null)}>×</button></div>}{lockExp&&<div className="lock-t">🕐 Reserved for: <strong>{getRemainingTime()}</strong></div>}<div className="stage">STAGE</div><div className="seat-map">{Object.keys(seats).sort().map(row=>(<div key={row} className="seat-row"><span className="row-l">{row}</span><div className="seat-seats">{seats[row].map(seat=>{const isSel=selected.some(s=>s.id===seat.id);const isLocked=seat.status==='locked'&&seat.locked_by!==sessionId.current;const unavail=seat.status==='booked'||isLocked;return(<button key={seat.id} className={`seat ${seat.tier} ${seat.status} ${isSel?'selected':''}`} disabled={unavail} onClick={()=>!unavail&&toggleSeat(seat)} title={`Row ${seat.row_label} Seat ${seat.seat_number}`}/>)})}</div><span className="row-l">{row}</span></div>))}</div><div className="legend"><div className="legend-i"><span className="legend-s av"></span>Available</div><div className="legend-i"><span className="legend-s sel"></span>Selected</div><div className="legend-i"><span className="legend-s bk"></span>Taken</div><div className="legend-i"><span className="legend-s vip"></span>VIP</div><div className="legend-i"><span className="legend-s prem"></span>Premium</div><div className="legend-i"><span className="legend-s std"></span>Standard</div></div></div><aside className="sidebar"><div className="summary"><h3>Booking Summary</h3><div className="tiers"><div className="tier"><span className="tier-c vip"></span><span className="tier-n">VIP</span><span className="tier-p">${event.vip_price||event.base_price*2}</span></div><div className="tier"><span className="tier-c prem"></span><span className="tier-n">Premium</span><span className="tier-p">${event.premium_price||event.base_price*1.5}</span></div><div className="tier"><span className="tier-c std"></span><span className="tier-n">Standard</span><span className="tier-p">${event.base_price}</span></div></div>{selected.length>0&&(<div className="sel-list"><h4>Selected ({selected.length})</h4>{selected.map(s=>(<div key={s.id} className="sel-item"><span>Row {s.row_label}, Seat {s.seat_number}</span><span className="sel-badge" style={{background:s.tier==='vip'?'#ffd700':s.tier==='premium'?'#c0c0c0':'#cd853f'}}>{s.tier}</span><span>${getPrice(s.tier)}</span></div>))}</div>)}<div className="total"><span>Total</span><span className="total-v">${total.toFixed(2)}</span></div><div className="form"><h4>Your Information</h4><input placeholder="Full Name *" value={user.name} onChange={e=>setUser({...user,name:e.target.value})}/><input placeholder="Email *" type="email" value={user.email} onChange={e=>setUser({...user,email:e.target.value})}/><input placeholder="Phone (optional)" value={user.phone} onChange={e=>setUser({...user,phone:e.target.value})}/></div><button className="btn" disabled={selected.length===0||locking} onClick={checkout}>{locking?'Processing...':'Proceed to Payment →'}</button></div></aside></div></div>)}

function Checkout({bookingId,setPage}){const[booking,setBooking]=useState(null);const[loading,setLoading]=useState(true);const[processing,setProcessing]=useState(false);const[error,setError]=useState(null);const[method,setMethod]=useState('card');const[card,setCard]=useState({number:'',expiry:'',cvv:'',name:''});useEffect(()=>{fetch(`${API}/api/bookings/${bookingId}`).then(r=>r.json()).then(data=>{if(data.status==='confirmed')setPage({name:'confirm',bookingId});else setBooking(data);setLoading(false)})},[bookingId]);const pay=async()=>{if(method==='card'&&(card.number.length<16||card.expiry.length<5||card.cvv.length<3||!card.name)){setError('Please fill all card details');return}setProcessing(true);setError(null);try{const res=await fetch(`${API}/api/payments`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bookingId,method})});const data=await res.json();if(!res.ok){setError(data.error);setProcessing(false);return}setPage({name:'confirm',bookingId})}catch{setError('Payment failed');setProcessing(false)}};if(loading)return<div className="loading"><div className="spinner"></div></div>;if(!booking)return<div className="empty"><h3>Booking not found</h3></div>;const d=new Date(booking.event_date);return(<div className="checkout"><div className="checkout-c"><div className="checkout-h"><h1>Complete Your Purchase</h1><div className="secure">🔒 Secure Checkout</div></div><div className="checkout-grid"><div className="pay-sec"><h2>Payment Method</h2>{error&&<div className="err-banner">{error}<button onClick={()=>setError(null)}>×</button></div>}<div className="methods">{['card','paypal','apple'].map(m=>(<label key={m} className={`method ${method===m?'sel':''}`}><input type="radio" name="method" value={m} checked={method===m} onChange={()=>setMethod(m)}/><div className="method-c"><div className="method-i">{m==='card'?'💳':m==='paypal'?'PP':'🍎'}</div><span>{m==='card'?'Credit/Debit Card':m==='paypal'?'PayPal':'Apple Pay'}</span></div></label>))}</div>{method==='card'&&(<div className="card-form"><div className="fg"><label>Card Number</label><input placeholder="1234 5678 9012 3456" value={card.number} onChange={e=>setCard({...card,number:e.target.value.replace(/\D/g,'').slice(0,16)})}/></div><div className="fr"><div className="fg"><label>Expiry</label><input placeholder="MM/YY" value={card.expiry} onChange={e=>setCard({...card,expiry:e.target.value.slice(0,5)})}/></div><div className="fg"><label>CVV</label><input placeholder="123" value={card.cvv} onChange={e=>setCard({...card,cvv:e.target.value.replace(/\D/g,'').slice(0,4)})}/></div></div><div className="fg"><label>Name on Card</label><input placeholder="John Doe" value={card.name} onChange={e=>setCard({...card,name:e.target.value})}/></div></div>)}<button className="pay-btn" disabled={processing} onClick={pay}>{processing?'⏳ Processing...':`🔒 Pay $${booking.total_amount.toFixed(2)}`}</button><p style={{fontSize:'.8rem',color:'var(--muted)',textAlign:'center'}}>Simulated payment for demo.</p></div><aside className="order-sum"><h2>Order Summary</h2><div className="o-info"><h3>{booking.event_name}</h3><div className="o-row">📅 {d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div><div className="o-row">🕐 {d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</div><div className="o-row">📍 {booking.venue_name}, {booking.city}</div></div><div style={{marginBottom:'1.5rem',paddingBottom:'1.5rem',borderBottom:'1px solid var(--border)'}}><h4 style={{fontSize:'.9rem',color:'var(--text2)',marginBottom:'.75rem'}}>Tickets ({booking.seats?.length||0})</h4>{booking.seats?.map(s=>(<div key={s.id} style={{display:'flex',justifyContent:'space-between',padding:'.5rem 0',fontSize:'.9rem'}}><span>Row {s.row_label}, Seat {s.seat_number}</span><span>${s.price.toFixed(2)}</span></div>))}</div><div className="o-total"><div className="o-tr"><span>Subtotal</span><span>${booking.total_amount.toFixed(2)}</span></div><div className="o-tr"><span>Fee</span><span>$0.00</span></div><div className="o-tr tot"><span>Total</span><span>${booking.total_amount.toFixed(2)}</span></div></div></aside></div></div></div>)}

function Confirmation({bookingId,setPage}){const[booking,setBooking]=useState(null);const[loading,setLoading]=useState(true);useEffect(()=>{fetch(`${API}/api/bookings/${bookingId}`).then(r=>r.json()).then(data=>{setBooking(data);setLoading(false)})},[bookingId]);if(loading)return<div className="loading"><div className="spinner"></div></div>;if(!booking||booking.status!=='confirmed')return<div className="empty"><h3>Booking not found</h3></div>;const d=new Date(booking.event_date);return(<div className="confirm"><div className="success-h"><div className="success-i">✅</div><h1>Booking Confirmed!</h1><p>Tickets sent to <strong>{booking.user_email}</strong></p><p style={{marginTop:'.75rem'}}>Reference: <code>{bookingId.slice(0,8).toUpperCase()}</code></p></div><div className="ticket"><div className="ticket-h"><span className="ticket-logo">◈ EVENTIX</span><span className="ticket-type">E-TICKET</span></div><div className="ticket-b"><div className="ticket-m"><h2 className="t-name">{booking.event_name}</h2><div className="ticket-d"><div className="d-block"><span className="d-label">DATE</span><span className="d-value">{d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'})}</span></div><div className="d-block"><span className="d-label">TIME</span><span className="d-value">{d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</span></div><div className="d-block"><span className="d-label">VENUE</span><span className="d-value">{booking.venue_name}</span></div><div className="d-block"><span className="d-label">LOCATION</span><span className="d-value">{booking.city}</span></div></div><div><span className="d-label">SEATS</span><div className="s-chips">{booking.seats?.map(s=><span key={s.id} className={`s-chip ${s.tier}`}>Row {s.row_label}, Seat {s.seat_number}</span>)}</div></div><div><span className="d-label">ATTENDEE</span><div style={{fontWeight:600,fontSize:'1.1rem'}}>{booking.user_name}</div></div></div><div className="ticket-qr">{booking.qr_code&&<img src={booking.qr_code} alt="QR" className="qr-img"/>}<span className="qr-instr">Scan for entry</span></div></div><div className="ticket-f"><div className="ticket-meta"><span>Transaction: {booking.payment?.transaction_id}</span><span>Amount: ${booking.total_amount.toFixed(2)}</span></div></div></div><div className="actions"><button className="act-btn" onClick={()=>window.print()}>🖨️ Print</button></div><div className="info-cards"><div className="info-card"><div className="info-icon">📍</div><h3>Getting There</h3><p>Arrive 30 min early.</p></div><div className="info-card"><div className="info-icon">🎫</div><h3>Entry</h3><p>Show QR at entrance.</p></div><div className="info-card"><div className="info-icon">❓</div><h3>Support</h3><p>support@eventix.com</p></div></div><div className="back-link"><span onClick={()=>setPage({name:'list'})}>← Browse More Events</span></div></div>)}

function SalonList({setPage}){
  const[salons,setSalons]=useState([]);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    fetch(`${API}/api/salons`).then(r=>r.json()).then(data=>{setSalons(data);setLoading(false)}).catch(()=>setLoading(false));
  },[]);
  return(
    <div>
      <header className="salon-hero hero">
        <div className="hero-c">
          <h1><span>Premium Salon</span><br/>& Spa Booking</h1>
          <p>Book your appointment at our luxury outlets — select your preferred seat, time, and service.</p>
        </div>
      </header>
      {loading?(
        <div className="loading"><div className="spinner salon-spin"></div><p>Loading salons...</p></div>
      ):(
        <div className="salon-cards">
          {salons.map(salon=>(
            <div key={salon.id} className="salon-card" onClick={()=>setPage({name:'salon',id:salon.id})}>
              <div className="salon-card-top">
                <div className="salon-icon">💆</div>
                <h2 className="salon-card-name">{salon.name}</h2>
                <p className="salon-card-tag">{salon.tagline}</p>
                <div className="salon-card-meta">
                  <span className="salon-chip">✨ {salon.outlet_count} Outlets</span>
                  <span className="salon-chip">💄 {salon.category}</span>
                </div>
              </div>
              <div className="salon-card-body">
                <p>{salon.description}</p>
                <div className="salon-outlets-preview">
                  <div style={{fontSize:'.8rem',fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'.5rem'}}>Locations</div>
                  {[...Array(Math.min(salon.outlet_count,3))].map((_,i)=>(
                    <div key={i} className="outlet-pill">📍 Lahore — Branch {i+1}</div>
                  ))}
                </div>
              </div>
              <div className="salon-card-cta">Book an Appointment →</div>
            </div>
          ))}
        </div>
      )}
    </div>
  )
}

function SalonDetail({id,setPage}){
  const[salon,setSalon]=useState(null);
  const[loading,setLoading]=useState(true);
  const[selectedOutlet,setSelectedOutlet]=useState(null);
  const[selectedService,setSelectedService]=useState(null);
  const[serviceCat,setServiceCat]=useState('All');
  const[step,setStep]=useState(1); // 1=outlet+service, 2=date+time, 3=seat+info

  // booking state
  const[selectedDate,setSelectedDate]=useState('');
  const[selectedTime,setSelectedTime]=useState('');
  const[slots,setSlots]=useState([]);
  const[slotsLoading,setSlotsLoading]=useState(false);
  const[availableSeats,setAvailableSeats]=useState([]);
  const[seatsLoading,setSeatsLoading]=useState(false);
  const[selectedSeat,setSelectedSeat]=useState(null);
  const[user,setUser]=useState({name:'',email:'',phone:''});
  const[error,setError]=useState(null);
  const[locking,setLocking]=useState(false);
  const[lockExp,setLockExp]=useState(null);
  const sessionId=useRef(getSessionId());

  useEffect(()=>{
    fetch(`${API}/api/salons/${id}`).then(r=>r.json()).then(data=>{setSalon(data);setLoading(false)}).catch(()=>setLoading(false));
  },[id]);

  // Generate next 14 days
  const getDates=()=>{
    const dates=[];
    for(let i=0;i<14;i++){
      const d=new Date();d.setDate(d.getDate()+i);
      dates.push(d);
    }
    return dates;
  };

  const fetchSlots=async(outletId,date)=>{
    setSlotsLoading(true);
    const data=await fetch(`${API}/api/salons/outlets/${outletId}/slots?date=${date}`).then(r=>r.json()).catch(()=>({slots:[]}));
    setSlots(data.slots||[]);
    setSlotsLoading(false);
  };

  const fetchSeats=async(outletId,date,time)=>{
    setSeatsLoading(true);
    const data=await fetch(`${API}/api/salons/outlets/${outletId}/availability?date=${date}&time=${time}`).then(r=>r.json()).catch(()=>({seats:[]}));
    setAvailableSeats(data.seats||[]);
    setSeatsLoading(false);
  };

  const handleDateSelect=(dateStr)=>{
    setSelectedDate(dateStr);setSelectedTime('');setSelectedSeat(null);setLockExp(null);
    if(selectedOutlet)fetchSlots(selectedOutlet.id,dateStr);
  };

  const handleTimeSelect=async(time)=>{
    setSelectedTime(time);setSelectedSeat(null);setLockExp(null);
    if(selectedOutlet&&selectedDate)fetchSeats(selectedOutlet.id,selectedDate,time);
  };

  const handleSeatSelect=async(seat)=>{
    if(seat.status==='booked'||seat.status==='locked')return;
    setError(null);setLocking(true);
    // Release previous lock if any
    if(selectedSeat&&selectedOutlet&&selectedDate&&selectedTime){
      await fetch(`${API}/api/salons/outlets/${selectedOutlet.id}/release`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:sessionId.current,date:selectedDate,time:selectedTime})}).catch(()=>{});
    }
    // Lock new seat
    const res=await fetch(`${API}/api/salons/outlets/${selectedOutlet.id}/lock`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({seatId:seat.id,date:selectedDate,time:selectedTime,sessionId:sessionId.current})});
    const data=await res.json();
    setLocking(false);
    if(!res.ok){setError(data.error);fetchSeats(selectedOutlet.id,selectedDate,selectedTime);return;}
    setSelectedSeat(seat);
    setLockExp(new Date(data.expiresAt));
    // Refresh seats to show lock
    fetchSeats(selectedOutlet.id,selectedDate,selectedTime);
  };

  const handleBook=async()=>{
    if(!user.name||!user.email){setError('Please fill your name and email');return;}
    setError(null);
    try{
      const res=await fetch(`${API}/api/salons/bookings`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({outletId:selectedOutlet.id,serviceId:selectedService.id,seatId:selectedSeat.id,date:selectedDate,time:selectedTime,sessionId:sessionId.current,userName:user.name,userEmail:user.email,userPhone:user.phone})});
      const data=await res.json();
      if(!res.ok){setError(data.error);return;}
      setPage({name:'salon-checkout',bookingId:data.bookingId});
    }catch{setError('Failed to create booking');}
  };

  const getRemainingTime=()=>{
    if(!lockExp)return null;
    const rem=Math.max(0,Math.floor((lockExp-new Date())/1000));
    return`${Math.floor(rem/60)}:${(rem%60).toString().padStart(2,'0')}`;
  };

  if(loading)return<div className="loading"><div className="spinner salon-spin"></div></div>;
  if(!salon)return<div className="empty"><h3>Salon not found</h3></div>;

  const serviceCats=['All',...new Set((salon.services||[]).map(s=>s.category))];
  const filteredServices=(salon.services||[]).filter(s=>serviceCat==='All'||s.category===serviceCat);

  const canGoNext1=selectedOutlet&&selectedService;
  const canGoNext2=selectedDate&&selectedTime;

  return(
    <div className="salon-detail">
      <header className="salon-detail-h">
        <div className="salon-detail-hc">
          <button className="back-btn" onClick={()=>setPage({name:'salons'})}>← Back to Salons</button>
          <span className="salon-badge">{salon.category}</span>
          <h1 className="salon-detail-name">{salon.name}</h1>
          <p className="salon-detail-tag">{salon.tagline}</p>
          <p style={{color:'var(--text2)',maxWidth:'700px'}}>{salon.description}</p>
        </div>
      </header>

      <div className="salon-detail-c">
        {/* Progress */}
        <div className="progress-bar"><div className="progress-fill" style={{width:`${(step/3)*100}%`}}></div></div>

        <div className="detail-layout">
          <div>
            {/* ── STEP 1: Outlet + Service ── */}
            {step>=1&&(
              <div style={{marginBottom:'2.5rem'}}>
                <h2 className="sec-title">① Choose Outlet</h2>
                <div className="outlets-grid">
                  {(salon.outlets||[]).map(outlet=>(
                    <div key={outlet.id} className={`outlet-card ${selectedOutlet?.id===outlet.id?'selected':''}`}
                      onClick={()=>{setSelectedOutlet(outlet);setSelectedDate('');setSelectedTime('');setSelectedSeat(null);}}>
                      <div className="outlet-name">{outlet.name}</div>
                      <div className="outlet-info">
                        <span>📍 {outlet.address}</span>
                        <span>🏙️ {outlet.city}</span>
                        <span>📞 {outlet.phone}</span>
                        <span>🕐 {outlet.open_time} – {outlet.close_time}</span>
                      </div>
                      <div className="outlet-badge">🪑 {outlet.seat_count} chairs</div>
                    </div>
                  ))}
                </div>

                <h2 className="sec-title">② Select Service</h2>
                <div className="service-cats">
                  {serviceCats.map(c=><button key={c} className={`cat ${serviceCat===c?'active':''}`} onClick={()=>setServiceCat(c)}>{c}</button>)}
                </div>
                <div className="services-grid">
                  {filteredServices.map(svc=>(
                    <div key={svc.id} className={`service-card ${selectedService?.id===svc.id?'selected':''}`} onClick={()=>setSelectedService(svc)}>
                      <div className="service-name">{svc.name}</div>
                      <div className="service-desc">{svc.description}</div>
                      <div className="service-meta">
                        <span className="service-dur">⏱ {svc.duration_minutes} min</span>
                        <span className="service-price">Rs. {fmt(svc.price)}</span>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:'2rem'}}>
                  <button className="btn salon-btn" disabled={!canGoNext1} style={{maxWidth:'300px'}} onClick={()=>setStep(2)}>
                    Continue to Date & Time →
                  </button>
                </div>
              </div>
            )}

            {/* ── STEP 2: Date + Time ── */}
            {step>=2&&(
              <div style={{marginBottom:'2.5rem'}}>
                <h2 className="sec-title">③ Pick a Date</h2>
                <div className="date-grid">
                  {getDates().map(d=>{
                    const ds=d.toISOString().split('T')[0];
                    const isToday=ds===new Date().toISOString().split('T')[0];
                    return(
                      <button key={ds} className={`date-btn ${selectedDate===ds?'selected':''}`} onClick={()=>handleDateSelect(ds)}>
                        <div className="date-day-name">{d.toLocaleDateString('en-US',{weekday:'short'})}</div>
                        <div className="date-day-num">{d.getDate()}</div>
                        {isToday&&<div style={{fontSize:'.6rem',color:'var(--ok)'}}>Today</div>}
                      </button>
                    );
                  })}
                </div>

                {selectedDate&&(
                  <>
                    <h2 className="sec-title">④ Choose Time Slot</h2>
                    {slotsLoading?(
                      <div style={{padding:'2rem',textAlign:'center',color:'var(--text2)'}}>Loading slots...</div>
                    ):(
                      <div className="slots-grid">
                        {slots.map(slot=>(
                          <button key={slot.time} className={`slot-btn ${selectedTime===slot.time?'selected':''} ${slot.available===0?'full':''}`}
                            disabled={slot.available===0} onClick={()=>handleTimeSelect(slot.time)}>
                            <div className="slot-time">{slot.time}</div>
                            <div className="slot-avail" style={{color:slot.available===0?'var(--err)':slot.available<3?'var(--warn)':'var(--ok)'}}>
                              {slot.available===0?'Full':`${slot.available} open`}
                            </div>
                          </button>
                        ))}
                      </div>
                    )}
                  </>
                )}

                <div style={{display:'flex',gap:'1rem',marginTop:'2rem'}}>
                  <button className="btn" style={{maxWidth:'200px',background:'var(--bg3)',color:'var(--text)'}} onClick={()=>setStep(1)}>← Back</button>
                  <button className="btn salon-btn" style={{maxWidth:'300px'}} disabled={!canGoNext2} onClick={()=>setStep(3)}>Select Your Seat →</button>
                </div>
              </div>
            )}

            {/* ── STEP 3: Seat + Info ── */}
            {step>=3&&(
              <div>
                <h2 className="sec-title">⑤ Choose Your Chair</h2>
                {error&&<div className="err-banner">{error}<button onClick={()=>setError(null)}>×</button></div>}
                {lockExp&&<div className="lock-t">🕐 Seat reserved for: <strong>{getRemainingTime()}</strong></div>}
                {seatsLoading?(
                  <div style={{padding:'2rem',textAlign:'center',color:'var(--text2)'}}>Loading chairs...</div>
                ):(
                  <>
                    <div className="salon-seat-grid">
                      {availableSeats.map(seat=>{
                        const isMyLock=seat.status==='locked'&&seat.locked_by===sessionId.current;
                        const statusClass=isMyLock?'selected':(selectedSeat?.id===seat.id?'selected':seat.status);
                        return(
                          <div key={seat.id} className={`salon-seat ${statusClass}`}
                            onClick={()=>handleSeatSelect(seat)}
                            title={seat.status==='booked'?'Booked':seat.status==='locked'&&!isMyLock?'Locked by someone else':seat.label}>
                            <span className="salon-seat-icon">{seat.status==='booked'?'🚫':seat.status==='locked'&&!isMyLock?'🔒':'💺'}</span>
                            <span className="salon-seat-label">{seat.label}</span>
                          </div>
                        );
                      })}
                    </div>
                    <div className="salon-seat-legend">
                      <div className="salon-legend-item"><span className="legend-dot" style={{background:'var(--bg3)',border:'1px solid var(--border)'}}></span>Available</div>
                      <div className="salon-legend-item"><span className="legend-dot" style={{background:'var(--salon)'}}></span>Selected</div>
                      <div className="salon-legend-item"><span className="legend-dot" style={{background:'rgba(255,255,255,.05)',opacity:.5}}></span>Taken</div>
                    </div>
                  </>
                )}

                {selectedSeat&&(
                  <div style={{marginTop:'2rem'}}>
                    <h2 className="sec-title">⑥ Your Details</h2>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'1rem'}}>
                      <input className="form-input" style={{padding:'.875rem 1rem',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'8px',color:'var(--text)',fontSize:'.95rem'}}
                        placeholder="Full Name *" value={user.name} onChange={e=>setUser({...user,name:e.target.value})}/>
                      <input style={{padding:'.875rem 1rem',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'8px',color:'var(--text)',fontSize:'.95rem'}}
                        placeholder="Email *" type="email" value={user.email} onChange={e=>setUser({...user,email:e.target.value})}/>
                    </div>
                    <input style={{width:'100%',padding:'.875rem 1rem',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'8px',color:'var(--text)',fontSize:'.95rem',marginBottom:'1.5rem'}}
                      placeholder="Phone (optional)" value={user.phone} onChange={e=>setUser({...user,phone:e.target.value})}/>
                  </div>
                )}

                <div style={{display:'flex',gap:'1rem',marginTop:'1.5rem'}}>
                  <button className="btn" style={{maxWidth:'200px',background:'var(--bg3)',color:'var(--text)'}} onClick={()=>setStep(2)}>← Back</button>
                  {selectedSeat&&<button className="btn salon-btn" style={{maxWidth:'300px'}} disabled={locking} onClick={handleBook}>{locking?'Reserving...':'Confirm Booking →'}</button>}
                </div>
              </div>
            )}
          </div>

          {/* Summary sidebar */}
          <aside>
            <div className="salon-summary">
              <h3>Appointment Summary</h3>
              <div className="sum-row"><span className="sum-label">Outlet</span><span className="sum-val">{selectedOutlet?.name||'—'}</span></div>
              <div className="sum-row"><span className="sum-label">Service</span><span className="sum-val">{selectedService?.name||'—'}</span></div>
              <div className="sum-row"><span className="sum-label">Duration</span><span className="sum-val">{selectedService?`${selectedService.duration_minutes} min`:'—'}</span></div>
              <div className="sum-row"><span className="sum-label">Date</span><span className="sum-val">{selectedDate||'—'}</span></div>
              <div className="sum-row"><span className="sum-label">Time</span><span className="sum-val">{selectedTime||'—'}</span></div>
              <div className="sum-row"><span className="sum-label">Chair</span><span className="sum-val">{selectedSeat?.label||'—'}</span></div>
              <div className="sum-total">
                <span className="sum-total-label">Total</span>
                <span className="sum-total-val">{selectedService?`Rs. ${fmt(selectedService.price)}`:'—'}</span>
              </div>
              {step<3&&<button className="btn salon-btn" disabled={!canGoNext1} onClick={()=>canGoNext1&&setStep(2)}>Continue →</button>}
            </div>
          </aside>
        </div>
      </div>
    </div>
  );
}

function SalonCheckout({bookingId,setPage}){
  const[booking,setBooking]=useState(null);
  const[loading,setLoading]=useState(true);
  const[processing,setProcessing]=useState(false);
  const[error,setError]=useState(null);
  const[method,setMethod]=useState('card');
  const[card,setCard]=useState({number:'',expiry:'',cvv:'',name:''});

  useEffect(()=>{
    fetch(`${API}/api/salons/bookings/${bookingId}`).then(r=>r.json()).then(data=>{
      if(data.status==='confirmed')setPage({name:'salon-confirm',bookingId});
      else setBooking(data);setLoading(false);
    }).catch(()=>setLoading(false));
  },[bookingId]);

  const pay=async()=>{
    if(method==='card'&&(card.number.length<16||card.expiry.length<5||card.cvv.length<3||!card.name)){setError('Please fill all card details');return;}
    setProcessing(true);setError(null);
    try{
      const res=await fetch(`${API}/api/salons/payments`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bookingId,method})});
      const data=await res.json();
      if(!res.ok){setError(data.error);setProcessing(false);return;}
      setPage({name:'salon-confirm',bookingId});
    }catch{setError('Payment failed');setProcessing(false);}
  };

  if(loading)return<div className="loading"><div className="spinner salon-spin"></div></div>;
  if(!booking)return<div className="empty"><h3>Booking not found</h3></div>;

  return(
    <div className="checkout">
      <div className="checkout-c">
        <div className="checkout-h">
          <h1>Complete Appointment</h1>
          <div className="secure">🔒 Secure Payment</div>
        </div>
        <div className="checkout-grid">
          <div className="pay-sec">
            <h2>Payment Method</h2>
            {error&&<div className="err-banner">{error}<button onClick={()=>setError(null)}>×</button></div>}
            <div className="methods">
              {['card','paypal','apple'].map(m=>(
                <label key={m} className={`method ${method===m?'salon-sel':''}`}>
                  <input type="radio" name="smethod" value={m} checked={method===m} onChange={()=>setMethod(m)}/>
                  <div className="method-c">
                    <div className="method-i">{m==='card'?'💳':m==='paypal'?'PP':'🍎'}</div>
                    <span>{m==='card'?'Credit/Debit Card':m==='paypal'?'PayPal':'Apple Pay'}</span>
                  </div>
                </label>
              ))}
            </div>
            {method==='card'&&(
              <div className="card-form">
                <div className="fg"><label>Card Number</label><input placeholder="1234 5678 9012 3456" value={card.number} onChange={e=>setCard({...card,number:e.target.value.replace(/\D/g,'').slice(0,16)})}/></div>
                <div className="fr">
                  <div className="fg"><label>Expiry</label><input placeholder="MM/YY" value={card.expiry} onChange={e=>setCard({...card,expiry:e.target.value.slice(0,5)})}/></div>
                  <div className="fg"><label>CVV</label><input placeholder="123" value={card.cvv} onChange={e=>setCard({...card,cvv:e.target.value.replace(/\D/g,'').slice(0,4)})}/></div>
                </div>
                <div className="fg"><label>Name on Card</label><input placeholder="John Doe" value={card.name} onChange={e=>setCard({...card,name:e.target.value})}/></div>
              </div>
            )}
            <button className="pay-btn salon-pay" disabled={processing} onClick={pay}>
              {processing?'⏳ Processing...':`🔒 Pay Rs. ${fmt(booking.amount)}`}
            </button>
            <p style={{fontSize:'.8rem',color:'var(--muted)',textAlign:'center'}}>Simulated payment for demo.</p>
          </div>
          <aside className="order-sum">
            <h2>Appointment Summary</h2>
            <div className="o-info">
              <h3>{booking.service_name}</h3>
              <div className="o-row">💆 {booking.service_description}</div>
              <div className="o-row">⏱ {booking.duration_minutes} minutes</div>
            </div>
            <div style={{marginBottom:'1.5rem',paddingBottom:'1.5rem',borderBottom:'1px solid var(--border)'}}>
              <div className="o-row">📍 {booking.outlet_name}</div>
              <div className="o-row">🏙️ {booking.address}, {booking.city}</div>
              <div className="o-row">📅 {booking.slot_date}</div>
              <div className="o-row">🕐 {booking.slot_time}</div>
              <div className="o-row">💺 {booking.seat_label}</div>
            </div>
            <div className="o-total">
              <div className="o-tr tot"><span>Total</span><span>Rs. {fmt(booking.amount)}</span></div>
            </div>
          </aside>
        </div>
      </div>
    </div>
  );
}

function SalonConfirmation({bookingId,setPage}){
  const[booking,setBooking]=useState(null);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    fetch(`${API}/api/salons/bookings/${bookingId}`).then(r=>r.json()).then(data=>{setBooking(data);setLoading(false)}).catch(()=>setLoading(false));
  },[bookingId]);
  if(loading)return<div className="loading"><div className="spinner salon-spin"></div></div>;
  if(!booking||booking.status!=='confirmed')return<div className="empty"><h3>Booking not found</h3></div>;
  return(
    <div className="confirm">
      <div className="success-h">
        <div className="success-i">✅</div>
        <h1>Appointment Booked!</h1>
        <p>Confirmation sent to <strong>{booking.user_email}</strong></p>
        <p style={{marginTop:'.75rem'}}>Reference: <code style={{color:'var(--salon)'}}>{bookingId.slice(0,8).toUpperCase()}</code></p>
      </div>
      <div className="ticket">
        <div className="ticket-h salon-ticket-h">
          <span className="ticket-logo">💆 LUMIÈRE</span>
          <span className="ticket-type">APPOINTMENT</span>
        </div>
        <div className="ticket-b">
          <div className="ticket-m">
            <h2 className="t-name">{booking.service_name}</h2>
            <div className="ticket-d">
              <div className="d-block"><span className="d-label">DATE</span><span className="d-value">{booking.slot_date}</span></div>
              <div className="d-block"><span className="d-label">TIME</span><span className="d-value">{booking.slot_time}</span></div>
              <div className="d-block"><span className="d-label">OUTLET</span><span className="d-value">{booking.outlet_name}</span></div>
              <div className="d-block"><span className="d-label">CHAIR</span><span className="d-value">{booking.seat_label}</span></div>
            </div>
            <div>
              <span className="d-label">SERVICE</span>
              <div className="s-chips"><span className="s-chip salon">{booking.service_name} • {booking.duration_minutes} min</span></div>
            </div>
            <div><span className="d-label">CLIENT</span><div style={{fontWeight:600,fontSize:'1.1rem'}}>{booking.user_name}</div></div>
          </div>
          <div className="ticket-qr">
            {booking.qr_code&&<img src={booking.qr_code} alt="QR" className="qr-img"/>}
            <span className="qr-instr">Show at reception</span>
          </div>
        </div>
        <div className="ticket-f">
          <div className="ticket-meta">
            <span>Transaction: {booking.transaction_id}</span>
            <span>Amount: Rs. {fmt(booking.amount)}</span>
          </div>
        </div>
      </div>
      <div className="actions">
        <button className="act-btn" onClick={()=>window.print()}>🖨️ Print</button>
        <button className="act-btn" onClick={()=>setPage({name:'salons'})}>← Back to Salons</button>
      </div>
      <div className="info-cards">
        <div className="info-card"><div className="info-icon">📍</div><h3>Getting There</h3><p>Arrive 10 minutes before your appointment. Ask for your stylist at reception.</p></div>
        <div className="info-card"><div className="info-icon">💆</div><h3>Preparation</h3><p>Come with clean, dry hair for hair services. Avoid heavy makeup for facial treatments.</p></div>
        <div className="info-card"><div className="info-icon">❓</div><h3>Need Help?</h3><p>Call the outlet directly or email support@lumiere.pk</p></div>
      </div>
      <div className="back-link"><span onClick={()=>setPage({name:'salons'})}>← Book Another Appointment</span></div>
    </div>
  );
}

function Admin({setPage}){const[stats,setStats]=useState(null);const[loading,setLoading]=useState(true);const[tab,setTab]=useState('overview');useEffect(()=>{fetchStats()},[]);const fetchStats=async()=>{setLoading(true);const data=await fetch(`${API}/api/admin/stats`).then(r=>r.json());setStats(data);setLoading(false)};const getColor=(cat)=>({Concert:'#FF6B6B',Theater:'#4ECDC4',Comedy:'#FFE66D',Sports:'#95E1D3'}[cat]||'#6366f1');if(loading)return<div className="loading"><div className="spinner"></div></div>;return(<div className="admin"><header className="admin-h"><div><h1>Admin Dashboard</h1><p>Monitor sales & bookings</p></div><button className="refresh" onClick={fetchStats}>🔄 Refresh</button></header><div className="tabs"><button className={tab==='overview'?'active':''} onClick={()=>setTab('overview')}>Overview</button><button className={tab==='events'?'active':''} onClick={()=>setTab('events')}>Events</button><button className={tab==='bookings'?'active':''} onClick={()=>setTab('bookings')}>Bookings</button></div>{tab==='overview'&&(<><div className="stats-g"><div className="stat-c" style={{'--accent':'#10B981'}}><div className="stat-i">💰</div><div className="stat-co"><span className="stat-t">Revenue</span><span className="stat-v">${stats?.totalRevenue?.toLocaleString()||0}</span></div></div><div className="stat-c" style={{'--accent':'#6366F1'}}><div className="stat-i">🎫</div><div className="stat-co"><span className="stat-t">Bookings</span><span className="stat-v">{stats?.totalBookings||0}</span></div></div><div className="stat-c" style={{'--accent':'#F59E0B'}}><div className="stat-i">🎪</div><div className="stat-co"><span className="stat-t">Events</span><span className="stat-v">{stats?.totalEvents||0}</span></div></div><div className="stat-c" style={{'--accent':'#EC4899'}}><div className="stat-i">📅</div><div className="stat-co"><span className="stat-t">Upcoming</span><span className="stat-v">{stats?.upcomingEvents||0}</span></div></div></div><div className="charts"><div className="chart-c"><h3>Revenue by Category</h3><div className="cat-bars">{stats?.revenueByCategory?.map(c=>{const max=Math.max(...(stats.revenueByCategory?.map(x=>x.revenue||0)||[1]));return(<div key={c.category} className="cat-row"><span className="cat-name">{c.category}</span><div className="bar-c"><div className="bar-f" style={{width:`${((c.revenue||0)/max)*100}%`,background:getColor(c.category)}}></div></div><span className="cat-val">${(c.revenue||0).toLocaleString()}</span></div>)})}</div></div><div className="chart-c"><h3>Recent Bookings</h3><div className="act-list">{stats?.recentBookings?.slice(0,5).map(b=>(<div key={b.id} className="act-item"><div className="act-ic" style={{background:getColor(b.category)}}>🎫</div><div className="act-co"><span className="act-ti">{b.event_name}</span><span className="act-me">{b.user_name} • ${b.total_amount}</span></div><span className="act-time">{new Date(b.created_at).toLocaleDateString()}</span></div>))}{!stats?.recentBookings?.length&&<p className="no-data">No bookings yet</p>}</div></div></div></>)}{tab==='events'&&(<div className="table-c"><table className="table"><thead><tr><th>Event</th><th>Date</th><th>Category</th><th>Sold</th><th>Revenue</th><th>Occupancy</th></tr></thead><tbody>{stats?.eventsSales?.map(e=>{const occ=e.total_seats>0?Math.round((e.seats_sold/e.total_seats)*100):0;return(<tr key={e.id}><td>{e.name}</td><td>{new Date(e.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</td><td><span className="cat-badge" style={{background:getColor(e.category)}}>{e.category}</span></td><td>{e.seats_sold} / {e.total_seats}</td><td className="rev-cell">${(e.total_revenue||0).toLocaleString()}</td><td><div className="occ-bar"><div><div className="occ-fill" style={{width:`${occ}%`,background:occ>75?'#10B981':occ>50?'#F59E0B':'#EF4444'}}></div></div><span>{occ}%</span></div></td></tr>)})}</tbody></table></div>)}{tab==='bookings'&&(<div className="table-c"><table className="table"><thead><tr><th>ID</th><th>Customer</th><th>Event</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead><tbody>{stats?.recentBookings?.map(b=>(<tr key={b.id}><td className="id-cell"><code>{b.id.slice(0,8).toUpperCase()}</code></td><td><div className="cust-cell"><span className="cust-name">{b.user_name}</span><span className="cust-email">{b.user_email}</span></div></td><td>{b.event_name}</td><td className="amt-cell">${b.total_amount.toFixed(2)}</td><td><span className={`status-b ${b.status}`}>{b.status}</span></td><td>{new Date(b.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</td></tr>))}</tbody></table></div>)}</div>)}

function Footer(){return(<footer className="footer"><div className="footer-c"><p>© 2026 EVENTIX</p><div className="footer-l"><span>Terms</span><span>Privacy</span><span>Support</span></div></div></footer>)}

// APP ROUTER
// ──────────────────────────────────────────────
function App(){
  const[page,setPage]=useState({name:'list'});
  let content;
  switch(page.name){
    case'detail':content=<EventDetail id={page.id} setPage={setPage}/>;break;
    case'checkout':content=<Checkout bookingId={page.bookingId} setPage={setPage}/>;break;
    case'confirm':content=<Confirmation bookingId={page.bookingId} setPage={setPage}/>;break;
    case'salons':content=<SalonList setPage={setPage}/>;break;
    case'salon':content=<SalonDetail id={page.id} setPage={setPage}/>;break;
    case'salon-checkout':content=<SalonCheckout bookingId={page.bookingId} setPage={setPage}/>;break;
    case'salon-confirm':content=<SalonConfirmation bookingId={page.bookingId} setPage={setPage}/>;break;
    case'admin':content=<Admin setPage={setPage}/>;break;
    default:content=<EventList setPage={setPage}/>;
  }
  return(<><Nav page={page} setPage={setPage}/><main className="main">{content}</main><Footer/></>)
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
